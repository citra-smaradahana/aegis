<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/aegis.png" />
    <link rel="apple-touch-icon" href="/aegis.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1e40af" />
    <meta
      name="description"
      content="Sistem manajemen keselamatan untuk pelaporan Fit To Work, Take 5, dan Hazard"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="AEGIS KMB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <title>AEGIS KMB - Safety Management System</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // TEMP: Nonaktifkan Service Worker dan bersihkan cache untuk mengatasi layar kosong di produksi
      // Setelah stabil, registrasi dapat diaktifkan kembali dengan uji menyeluruh.
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker
            .getRegistrations()
            .then((regs) => Promise.all(regs.map((r) => r.unregister())))
            .then(() =>
              caches
                ?.keys()
                .then((keys) => Promise.all(keys.map((k) => caches.delete(k)))),
            )
            .then(() =>
              console.log(
                "All service workers unregistered and caches cleared",
              ),
            )
            .catch((e) => console.warn("SW cleanup failed:", e));
        });
      }
    </script>
  </body>
</html>
